<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-plane"></i> TravelHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#destinations">Destinations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#trips">My Trips</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#bookings">Bookings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold text-white mb-4">Discover Your Next Adventure</h1>
                    <p class="lead text-white mb-4">Plan, book, and manage your perfect trips with our comprehensive travel management system.</p>
                    <button class="btn btn-light btn-lg me-3" onclick="showDestinations()">
                        <i class="fas fa-search"></i> Explore Destinations
                    </button>
                    <button class="btn btn-outline-light btn-lg" onclick="showTripForm()">
                        <i class="fas fa-plus"></i> Plan Trip
                    </button>
                </div>
                <div class="col-lg-6">
                    <img src="/static/images/hero-travel.jpg" alt="Travel" class="img-fluid rounded-3 shadow-lg" onerror="this.src='https://picsum.photos/seed/travel/600/400.jpg'">
                </div>
            </div>
        </div>
    </section>

    <!-- Destinations Section -->
    <section id="destinations" class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-5">Popular Destinations</h2>
            <div class="row" id="destinations-grid">
                <!-- Destinations will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Trip Planning Section -->
    <section id="trips" class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">My Trips</h2>
            <div class="row mb-4">
                <div class="col-12">
                    <button class="btn btn-primary" onclick="showTripForm()">
                        <i class="fas fa-plus"></i> Create New Trip
                    </button>
                </div>
            </div>
            <div class="row" id="trips-grid">
                <!-- Trips will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Bookings Section -->
    <section id="bookings" class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-5">My Bookings</h2>
            <div class="row" id="bookings-grid">
                <!-- Bookings will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Trip Modal -->
    <div class="modal fade" id="tripModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Plan New Trip</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="tripForm">
                        <div class="mb-3">
                            <label class="form-label">Trip Title</label>
                            <input type="text" class="form-control" id="tripTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="tripDescription" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" class="form-control" id="startDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date</label>
                                <input type="date" class="form-control" id="endDate" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Budget ($)</label>
                            <input type="number" class="form-control" id="tripBudget" min="0" step="0.01">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">User ID</label>
                            <input type="number" class="form-control" id="userId" value="1" min="1">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createTrip()">Create Trip</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Make Booking</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookingForm">
                        <div class="mb-3">
                            <label class="form-label">Destination</label>
                            <select class="form-control" id="bookingDestination" required>
                                <option value="">Select a destination</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Trip</label>
                            <select class="form-control" id="bookingTrip" required>
                                <option value="">Select a trip</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Check-in Date</label>
                                <input type="date" class="form-control" id="checkInDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Check-out Date</label>
                                <input type="date" class="form-control" id="checkOutDate" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Number of Guests</label>
                                <input type="number" class="form-control" id="numberOfGuests" value="1" min="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Total Price ($)</label>
                                <input type="number" class="form-control" id="totalPrice" min="0" step="0.01" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Booking Type</label>
                            <select class="form-control" id="bookingType">
                                <option value="hotel">Hotel</option>
                                <option value="flight">Flight</option>
                                <option value="car_rental">Car Rental</option>
                                <option value="activity">Activity</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">User ID</label>
                            <input type="number" class="form-control" id="bookingUserId" value="1" min="1">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createBooking()">Book Now</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
